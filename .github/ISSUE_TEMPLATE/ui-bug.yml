name: 🎨 UI Bug
about: UI 显示或交互问题
title: "[UI] "
labels: ["ui", "bug"]

body:
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - Room (Cozy Room)
        - Game (Shopify Store)
        - Component (shadcn/ui)
        - API Integration
        - Build/Deploy
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - 🔴 Blocker — 功能完全不可用
        - 🟠 Major — 核心功能受影响
        - 🟡 Minor — 视觉/体验问题
        - 🟢 Trivial — 细节优化
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 在哪个组件？什么操作触发？
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 Cozy Room
        2. 点击 xxx
        3. 看到...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期表现
      placeholder: 应该显示/发生什么

  - type: input
    id: browser
    attributes:
      label: 浏览器/环境
      placeholder: Chrome 126 / Electron 28 / Safari

  - type: textarea
    id: screenshot
    attributes:
      label: 截图
      description: 如有 UI 问题请贴截图
